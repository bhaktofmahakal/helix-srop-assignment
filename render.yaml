services:
  - type: web
    name: helix-srop
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: auto
      - key: GOOGLE_API_KEY
        sync: false
