services:
  - type: web
    name: helix-srop
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: auto
      - key: HF_TOKEN
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
